<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transitions for interactive elements */
        .panel { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.5s forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans text-slate-800">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-600">
                🎨 Pitch Visualizer
            </h1>
            <p class="text-lg text-slate-500">Transform your story into a stunning visual storyboard.</p>
        </header>

        <main>
            <div class="bg-white p-6 md:p-8 rounded-2xl shadow-xl shadow-slate-200/50 mb-10 border border-slate-100 transition-all hover:shadow-2xl">
                <form id="storyboard-form" class="space-y-6">
                    <div>
                        <label class="block mb-2 font-semibold text-slate-700">Your Story Text (3-5 sentences):</label>
                        <textarea 
                            name="text" 
                            rows="4" 
                            required
                            class="w-full border border-slate-300 rounded-xl p-4 focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all resize-y text-slate-700 placeholder-slate-400" 
                            placeholder="A brilliant software engineer finally perfects a teleportation device. She tests it on her pet iguana. They both end up on a spaceship exploring a distant galaxy. The alien crew is surprisingly welcoming..."></textarea>
                    </div>
                    
                    <div>
                        <label class="block mb-2 font-semibold text-slate-700">Select Visual Style:</label>
                        <select name="style" class="w-full border border-slate-300 rounded-xl p-4 focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-slate-700 bg-white">
                            <option value="digital art">✨ Digital Art</option>
                            <option value="photorealistic">📸 Photorealistic</option>
                            <option value="watercolor">🖌️ Watercolor</option>
                            <option value="cyberpunk">🌆 Cyberpunk</option>
                            <option value="anime">🌸 Anime</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold px-6 py-4 rounded-xl hover:from-indigo-700 hover:to-purple-700 focus:ring-4 focus:ring-purple-500/30 transition-all transform hover:-translate-y-0.5 shadow-lg flex justify-center items-center gap-2">
                        <span>Generate Storyboard</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </button>
                </form>
            </div>

            <div id="result" class="min-h-[200px]">
                <!-- Results injected here -->
            </div>
        </main>
    </div>

    <script>
        document.getElementById('storyboard-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const resultDiv = document.getElementById('result');
            const submitBtn = form.querySelector('button[type="submit"]');
            
            // Loading State
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Generating Storyboard...
            `;
            
            resultDiv.innerHTML = `
                <div class="flex flex-col items-center justify-center p-12 text-slate-500">
                    <div class="animate-pulse flex space-x-4 mb-4">
                        <div class="rounded-full bg-slate-200 h-10 w-10"></div>
                        <div class="flex-1 space-y-6 py-1">
                            <div class="h-2 bg-slate-200 rounded"></div>
                            <div class="space-y-3">
                                <div class="grid grid-cols-3 gap-4">
                                    <div class="h-2 bg-slate-200 rounded col-span-2"></div>
                                    <div class="h-2 bg-slate-200 rounded col-span-1"></div>
                                </div>
                                <div class="h-2 bg-slate-200 rounded"></div>
                            </div>
                        </div>
                    </div>
                    <p class="animate-pulse">Analyzing text and communicating with APIs. This may take a minute...</p>
                </div>
            `;

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                // Build storyboard grid
                let html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">';
                data.segments.forEach((seg, idx) => {
                    // Delay animation for each card
                    const animDelay = idx * 0.15;
                    
                    html += `
                        <div class="panel bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden group hover:shadow-xl transition-all duration-300" style="animation-delay: ${animDelay}s">
                            <div class="relative overflow-hidden aspect-square">
                                <img src="${seg.image_url}" alt="Panel ${idx+1}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-in-out">
                                <div class="absolute top-4 left-4 bg-black/60 backdrop-blur-md text-white px-3 py-1 rounded-full text-sm font-bold shadow-lg">
                                    Panel ${idx + 1}
                                </div>
                            </div>
                            <div class="p-6">
                                <p class="text-slate-800 font-medium leading-relaxed italic mb-4">
                                    "${seg.original}"
                                </p>
                                <div class="h-px w-full bg-slate-100 my-4"></div>
                                <details class="group/detail">
                                    <summary class="cursor-pointer text-sm font-semibold text-indigo-600 flex items-center gap-2 select-none hover:text-indigo-800 transition-colors">
                                        <svg class="w-4 h-4 transform group-open/detail:rotate-180 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        Prompt Details
                                    </summary>
                                    <div class="mt-3 text-xs text-slate-500 bg-slate-50 p-3 rounded-lg border border-slate-100">
                                        ${seg.enhanced_prompt}
                                    </div>
                                </details>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                resultDiv.innerHTML = html;
                
            } catch (err) {
                resultDiv.innerHTML = `
                    <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg shadow-sm">
                        <div class="flex">
                            <div class="flex-shrink-0">
                                <svg class="h-5 w-5 text-red-500" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                                </svg>
                            </div>
                            <div class="ml-3">
                                <h3 class="text-sm font-medium text-red-800">Generation Failed</h3>
                                <div class="mt-2 text-sm text-red-700">
                                    <p>${err.message}</p>
                                </div>
                            </div>
                        </div>
                    </div>`;
            } finally {
                // Reset Loading State
                submitBtn.disabled = false;
                submitBtn.innerHTML = `
                    <span>Generate Storyboard</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                `;
            }
        });
    </script>
</body>
</html>
